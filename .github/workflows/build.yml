name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      variant:
        description: 'Installer variant (minimal | full | both)'
        required: false
        default: 'both'

jobs:
  # ---------------------------------------------------------------------------
  # Minimal installer variant (Task 38).
  # No models bundled — first-run download (Task 22).
  # ---------------------------------------------------------------------------
  build-minimal:
    name: Minimal (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt pyinstaller
          cd ../frontend
          npm install

      - name: Build Minimal Installer (PyInstaller)
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            powershell -File scripts/build-minimal.ps1 -SkipTauri
          else
            scripts/build-minimal.sh --skip-tauri
          fi

      - name: Build Tauri App
        shell: bash
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npm install -g @tauri-apps/cli
          npm run tauri build

      - name: Bundle Size Check (Full)
        shell: bash
        run: |
          # Check sidecar
          if [ "$RUNNER_OS" = "Windows" ]; then
            python scripts/check_bundle_size.py --artifact sidecar --path backend/dist/ganesh-backend.exe
          else
            python scripts/check_bundle_size.py --artifact sidecar --path backend/dist/ganesh-backend
          fi
          # Check installer
          python scripts/check_bundle_size.py --artifact full --path src-tauri/target/release/bundle/

      - name: Upload Full Artifacts

        uses: actions/upload-artifact@v4
        with:
          name: ganesh-full-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/*/*.sig
            backend/dist/ganesh-backend
            backend/dist/ganesh-backend.exe
            backend/dist/models/

      - name: Release (Full)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.sig
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
