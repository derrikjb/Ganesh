name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Backend Deps
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pyyaml

      - name: Install Frontend Deps
        run: |
          cd frontend
          npm install

      - name: Run Preflight
        run: |
          cd backend
          # Assuming preflight is a script or command
          python -m pip install ruff mypy
          ruff check .
          mypy .

      - name: Run Pytest
        run: |
          cd backend
          pytest

      - name: Run Vitest
        run: |
          cd frontend
          npm run test:unit -- --run

      - name: Install Playwright Browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Run Playwright Integration Tests
        run: |
          cd frontend
          npx playwright test

      - name: Upload Playwright Report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: frontend/playwright-report/
          retention-days: 7

      - name: Cargo Check
        if: hashFiles('src-tauri/Cargo.toml') != ''
        run: |
          cd src-tauri
          cargo check

      - name: Build and Check Frozen Binary
        run: |
          cd backend
          pip install pyinstaller
          pyinstaller --onefile main.py --name ganesh-backend
          ./dist/ganesh-backend --check-imports
