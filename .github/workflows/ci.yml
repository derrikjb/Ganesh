name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Backend Deps
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pyyaml ruff mypy types-PyYAML

      - name: Install Frontend Deps
        run: |
          cd frontend
          npm install

      - name: Lint Python (ruff)
        run: |
          cd backend
          ruff check .

      - name: Type Check Python (mypy)
        run: |
          cd backend
          mypy .

      - name: Lint TypeScript (eslint)
        run: |
          cd frontend
          npm run lint

      - name: Type Check TypeScript (tsc --noEmit)
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Port Scan
        run: |
          cd backend
          pytest tests/test_no_hardcoded_ports.py

      - name: Run Pytest
        run: |
          cd backend
          pytest

      - name: Run Vitest
        run: |
          cd frontend
          npm run test:unit -- --run

      - name: Install Playwright Browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Run Playwright Integration Tests
        run: |
          cd frontend
          npx playwright test

      - name: Upload Playwright Report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: frontend/playwright-report/
          retention-days: 7

      - name: Cargo Check
        if: hashFiles('src-tauri/Cargo.toml') != ''
        run: |
          cd src-tauri
          cargo check

      - name: Build and Check Frozen Binary
        run: |
          cd backend
          pip install pyinstaller
          pyinstaller --onefile main.py --name ganesh-backend
          ./dist/ganesh-backend --check-imports

      - name: Bundle Size Check
        run: |
          python scripts/check_bundle_size.py --artifact sidecar --path backend/dist/ganesh-backend

  build-variants:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        variant: [minimal, full]
    runs-on: ${{ matrix.os }}
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install Backend Deps
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Restore pre-bundled models (full variant only)
        if: matrix.variant == 'full'
        id: cache-models
        uses: actions/cache@v4
        with:
          path: backend/prebuilt_models
          key: ganesh-models-${{ runner.os }}-v1
          fail-on-cache-miss: false

      - name: Build Minimal Sidecar (spec validation)
        if: matrix.variant == 'minimal'
        run: |
          cd backend
          pyinstaller pyinstaller-minimal.spec --noconfirm

      - name: Build Full Sidecar (spec validation)
        if: matrix.variant == 'full'
        run: |
          cd backend
          pyinstaller pyinstaller-full.spec --noconfirm

      - name: Bundle Size Check
        run: |
          python scripts/check_bundle_size.py --artifact sidecar --path backend/dist/ganesh-backend

      - name: Verify minimal dist has no model files
        if: matrix.variant == 'minimal'
        shell: bash
        run: |
          set -e
          if find backend/dist -name "*.onnx" -o -name "*.bin" | grep -q .; then
            echo "ERROR: minimal dist contains model weight files" >&2
            find backend/dist -name "*.onnx" -o -name "*.bin"
            exit 1
          fi
          echo "OK: minimal dist has no .onnx/.bin model files"

      - name: Verify full dist has models (when cache hit)
        if: matrix.variant == 'full' && steps.cache-models.outputs.cache-hit == 'true'
        shell: bash
        run: |
          set -e
          if [ ! -d backend/dist/models ]; then
            echo "ERROR: full dist/models/ directory missing" >&2
            exit 1
          fi
          for model in stt.bin tts.onnx embeddings.bin; do
            if [ ! -f "backend/dist/models/$model" ]; then
              echo "WARNING: $model not in dist/models/ (cache may have been incomplete)"
            fi
          done
          echo "OK: full dist/models/ present"

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: ganesh-${{ matrix.variant }}-sidecar-${{ matrix.os }}
          path: |
            backend/dist/ganesh-backend
            backend/dist/ganesh-backend.exe
            backend/dist/models/
          if-no-files-found: ignore
          retention-days: 3
